{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto my-10 bg-white dark:bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700">
    <h2 class="text-3xl font-black text-center text-primary-500 mb-6">Autentificare</h2>
    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div>
            <label for="id_username" class="block text-sm font-bold text-slate-700 dark:text-slate-200 mb-2">Utilizator</label>
            <input type="text" name="username" id="id_username" required
                   class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 outline-none transition">
        </div>
        <div>
            <label for="id_password" class="block text-sm font-bold text-slate-700 dark:text-slate-200 mb-2">Parolă</label>
            <input type="password" name="password" id="id_password" required
                   class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 outline-none transition">
        </div>
        {% if form.errors %}
        <p class="text-red-500 text-sm font-bold">Utilizator sau parolă incorectă!</p>
        {% endif %}
        <button type="submit" class="w-full bg-primary-500 hover:bg-primary-900 text-white font-bold py-3 rounded-lg shadow-lg transform active:scale-95 transition duration-150">
            Conectare
        </button>
    </form>
    <div class="mt-6 text-center text-sm text-slate-500 dark:text-slate-400">
        Nu ai cont? Contactează administratorul MikroLearning.
    </div>
</div>
{% endblock %}
