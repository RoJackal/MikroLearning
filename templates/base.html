<!DOCTYPE html>
<html lang="ro" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MikroLearning - MTCNA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eef2ff', 500: '#6366f1', 900: '#1e1b4b' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-200">
<nav class="bg-slate-800 p-4 text-white shadow-lg border-b border-primary-500">
    <div class="container mx-auto flex justify-between items-center">
        <div class="flex items-center space-x-8">
            <a href="{% url 'course_list' %}" class="text-2xl font-bold tracking-tight hover:text-primary-500 transition">MikroLearning</a>
            <div class="hidden md:flex space-x-6">
                <a href="{% url 'course_list' %}" class="hover:text-primary-500 transition font-medium">Cursuri</a>
                {% if user.is_authenticated %}
                <a href="{% url 'course_add' %}" class="hover:text-primary-500 transition font-medium">Adaugă Curs</a>
                {% endif %}
            </div>
        </div>
        <div class="flex items-center space-x-6">
            {% if user.is_authenticated %}
            <div class="flex items-center space-x-4">
                <span class="text-slate-300 text-sm italic">Salut, <strong class="text-white">{{ user.username }}</strong></span>
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white text-sm px-4 py-1.5 rounded-md font-bold transition">Logout</button>
                </form>
            </div>
            {% else %}
            <a href="{% url 'login' %}" class="bg-primary-500 hover:bg-primary-600 px-4 py-1.5 rounded-md font-bold transition">Login</a>
            {% endif %}
        </div>
    </div>
</nav>
<main class="container mx-auto py-10 px-6">
    <div class="bg-white dark:bg-slate-800 rounded-xl shadow-xl p-8 border border-slate-200 dark:border-slate-700">
        {% block content %}{% endblock %}
    </div>
</main>
<footer class="container mx-auto text-center py-6 text-slate-500 text-sm">
    &copy; 2026 MikroLearning Platform - Proiect Curs Python
</footer>
</body>
</html>
