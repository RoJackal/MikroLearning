{% extends 'base.html' %}
{% block content %}
<div class="max-w-lg mx-auto bg-white dark:bg-slate-800 p-8 rounded-xl shadow-2xl border border-red-500/50">
    <div class="flex items-center space-x-4 mb-6 text-red-600">
        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
        <h2 class="text-3xl font-black uppercase tracking-tight">Confirm Deletion</h2>
    </div>
    <p class="mb-8 text-slate-700 dark:text-slate-200 leading-relaxed">
        Are you sure you want to permanently delete the course: <br>
        <strong class="text-primary-500 text-lg">"{{ object.title }}"</strong>? <br>
        This action cannot be undone and all associated enrollment data will be lost.
    </p>
    <form method="post" class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-4">
        {% csrf_token %}
        <button type="submit" class="flex-1 bg-red-600 hover:bg-red-800 text-white px-6 py-3 rounded-lg font-black transition shadow-lg transform active:scale-95">
            YES, DELETE COURSE
        </button>
        <a href="{% url 'course_list' %}" class="flex-1 bg-slate-500 hover:bg-slate-600 text-white px-6 py-3 rounded-lg font-bold text-center transition">
            CANCEL
        </a>
    </form>
</div>
{% endblock %}
